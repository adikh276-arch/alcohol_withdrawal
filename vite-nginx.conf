server {
    listen 80;
    server_name localhost;

    location /alcohol_withdrawal/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /alcohol_withdrawal/index.html;
    }

    # Redirect root to subpath
    location = / {
        return 301 /alcohol_withdrawal/;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
